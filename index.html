<script>
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbxOrKdeE68RiYH3ZKEUxOgJ0rHTQieR7Jpzrtwwm1YcWfVON7TzVJzjzwGLrbDuCkxYSg/exec';

const REWRITE_DAYS = 120;
const EXPLAINABLE_DAYS = 180;

let RAW = null;
let DETAIL = null;
let ALL_AGENTS = [];
let ALL_OFFICES = [];

let view = 'agent';
let agentSel = null;
let officeSel = null;
let overallTot = { first: 0, rewrite: 0, exp: 0, winback: 0, total: 0 };
let cachedEnt = [];

let trendCh, donutCh, stackCh, detailTrendCh;

const tblSort = {
  risk: { col: 'rewrite_pct', dir: 'desc' },
  vol: { col: 'total', dir: 'desc' }
};

const navStack = [];

Chart.defaults.color = '#5a7499';
Chart.defaults.font.family = "'Inter', sans-serif";

function getMonths() {
  return RAW && Array.isArray(RAW.all_months) ? RAW.all_months : [];
}

function getMonthLabels() {
  return RAW && RAW.month_labels ? RAW.month_labels : {};
}

function parseDate(str) {
  if (!str) return null;

  let m = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (m) return new Date(+m[3], +m[1] - 1, +m[2]);

  m = str.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (m) return new Date(+m[1], +m[2] - 1, +m[3]);

  return null;
}

function parseCSV(text) {
  const lines = text.split('\n').filter(l => l.trim());
  if (!lines.length) return [];

  function parseLine(line) {
    const fields = [];
    let cur = '';
    let inQ = false;

    for (let i = 0; i < line.length; i++) {
      const ch = line[i];

      if (ch === '"') {
        if (inQ && line[i + 1] === '"') {
          cur += '"';
          i++;
        } else {
          inQ = !inQ;
        }
      } else if (ch === ',' && !inQ) {
        fields.push(cur.trim());
        cur = '';
      } else {
        cur += ch;
      }
    }

    fields.push(cur.trim());
    return fields;
  }

  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const f = parseLine(lines[i]);
    if (f.length < 13) continue;

    const payFor = (f[7] || '').trim();
    if (payFor !== 'Down Payment') continue;

    const dateStr = (f[1] || '').trim();
    const date = parseDate(dateStr);
    if (!date) continue;

    rows.push({
      date,
      dateStr,
      policy: (f[4] || '').trim().replace(/^['"\s]+|['"\s]+$/g, ''),
      custName: (f[5] || '').trim(),
      email: (f[6] || '').trim().toLowerCase(),
      agent: (f[12] || '').trim(),
      office: (f[13] || '').trim()
    });
  }

  return rows;
}

function custKey(row) {
  const email = (row.email || '').replace(/\s/g, '');
  if (email && email !== 'nan') return email;
  return (row.custName || '').toLowerCase().replace(/[^a-z0-9]/g, '');
}

function classify(rows) {
  rows.sort((a, b) => {
    const ka = custKey(a);
    const kb = custKey(b);
    if (ka < kb) return -1;
    if (ka > kb) return 1;
    return a.date - b.date;
  });

  const prevDate = {};

  for (const row of rows) {
    const ck = custKey(row);
    row.cust_key = ck;

    if (!prevDate[ck]) {
      row.classification = 'First';
    } else {
      const gap = Math.round((row.date - prevDate[ck]) / 86400000);

      if (gap <= REWRITE_DAYS) row.classification = 'Rewrite';
      else if (gap <= EXPLAINABLE_DAYS) row.classification = 'Explainable Rewrite';
      else row.classification = 'Winback';
    }

    prevDate[ck] = row.date;
    row.month = row.date.toISOString().slice(0, 7);
  }

  return rows;
}

function monthLabel(m) {
  const d = new Date(m + '-01');
  return d.toLocaleDateString('en-US', { month: 'short', year: '2-digit' });
}

function buildMainData(rows) {
  const agentMap = {};
  const officeMap = {};

  for (const r of rows) {
    const mo = r.month;
    const cls = r.classification;

    const f = cls === 'First' ? 1 : 0;
    const rw = cls === 'Rewrite' ? 1 : 0;
    const ex = cls === 'Explainable Rewrite' ? 1 : 0;
    const wb = cls === 'Winback' ? 1 : 0;

    const ak = r.agent + '||' + mo;
    if (!agentMap[ak]) {
      agentMap[ak] = { agent: r.agent, office: r.office, month: mo, first: 0, rewrite: 0, exp: 0, winback: 0, total: 0 };
    }
    agentMap[ak].first += f;
    agentMap[ak].rewrite += rw;
    agentMap[ak].exp += ex;
    agentMap[ak].winback += wb;
    agentMap[ak].total++;

    const ok = r.office + '||' + mo;
    if (!officeMap[ok]) {
      officeMap[ok] = { office: r.office, month: mo, first: 0, rewrite: 0, exp: 0, winback: 0, total: 0 };
    }
    officeMap[ok].first += f;
    officeMap[ok].rewrite += rw;
    officeMap[ok].exp += ex;
    officeMap[ok].winback += wb;
    officeMap[ok].total++;
  }

  const allMonths = [...new Set(rows.map(r => r.month))].sort();
  const monthLabels = {};
  allMonths.forEach(m => { monthLabels[m] = monthLabel(m); });

  return {
    all_months: allMonths,
    month_labels: monthLabels,
    agent_rows: Object.values(agentMap),
    office_rows: Object.values(officeMap)
  };
}

function buildDetailData(rows) {
  function monthlyDetail(grp) {
    const map = {};
    for (const r of grp) {
      if (!map[r.month]) map[r.month] = { first: 0, rewrite: 0, exp: 0, winback: 0, total: 0 };

      if (r.classification === 'First') map[r.month].first++;
      else if (r.classification === 'Rewrite') map[r.month].rewrite++;
      else if (r.classification === 'Explainable Rewrite') map[r.month].exp++;
      else if (r.classification === 'Winback') map[r.month].winback++;

      map[r.month].total++;
    }
    return map;
  }

  function topCustomers(grp, n = 15) {
    const rewRows = grp.filter(r => r.classification === 'Rewrite' || r.classification === 'Explainable Rewrite');
    const rewCustKeys = new Set(rewRows.map(r => r.cust_key));
    const custMap = {};

    for (const r of grp) {
      const ck = r.cust_key;
      if (!custMap[ck]) {
        custMap[ck] = {
          name: (r.custName || '').substring(0, 35),
          dates: [],
          rewrite: 0,
          explainable: 0,
          winback: 0,
          total: 0
        };
      }

      custMap[ck].dates.push(r.date);
      custMap[ck].total++;

      if (r.classification === 'Rewrite') custMap[ck].rewrite++;
      else if (r.classification === 'Explainable Rewrite') custMap[ck].explainable++;
      else if (r.classification === 'Winback') custMap[ck].winback++;
    }

    return Object.entries(custMap)
      .filter(([ck]) => rewCustKeys.has(ck))
      .map(([, c]) => ({
        name: c.name,
        first_date: new Date(Math.min(...c.dates)).toISOString().slice(0, 10),
        latest_date: new Date(Math.max(...c.dates)).toISOString().slice(0, 10),
        rewrite: c.rewrite,
        explainable: c.explainable,
        winback: c.winback,
        total: c.total
      }))
      .sort((a, b) => (b.rewrite + b.explainable) - (a.rewrite + a.explainable))
      .slice(0, n);
  }

  const agentGroups = {};
  const officeGroups = {};

  for (const r of rows) {
    if (!agentGroups[r.agent]) agentGroups[r.agent] = [];
    agentGroups[r.agent].push(r);

    if (!officeGroups[r.office]) officeGroups[r.office] = [];
    officeGroups[r.office].push(r);
  }

  const agentDetail = {};
  for (const [agent, grp] of Object.entries(agentGroups)) {
    const officeCounts = {};
    for (const r of grp) officeCounts[r.office] = (officeCounts[r.office] || 0) + 1;

    agentDetail[agent] = {
      monthly: monthlyDetail(grp),
      top_customers: topCustomers(grp),
      offices: officeCounts
    };
  }

  const officeDetail = {};
  for (const [office, grp] of Object.entries(officeGroups)) {
    const agentStats = {};

    for (const r of grp) {
      if (!agentStats[r.agent]) agentStats[r.agent] = { name: r.agent, total: 0, rewrite: 0 };
      agentStats[r.agent].total++;
      if (r.classification === 'Rewrite') agentStats[r.agent].rewrite++;
    }

    const agents = Object.values(agentStats)
      .map(a => ({
        ...a,
        rewrite_pct: a.total > 0 ? parseFloat((a.rewrite / a.total * 100).toFixed(1)) : 0
      }))
      .sort((a, b) => b.rewrite_pct - a.rewrite_pct)
      .slice(0, 20);

    officeDetail[office] = {
      monthly: monthlyDetail(grp),
      agents,
      top_customers: topCustomers(grp)
    };
  }

  return { agent: agentDetail, office: officeDetail };
}

function showLoader(msg) {
  const overlay = document.getElementById('loaderOverlay');
  const msgEl = document.getElementById('loaderMsg');
  if (overlay) overlay.style.display = 'flex';
  if (msgEl) msgEl.textContent = msg;
}

function hideLoader() {
  const overlay = document.getElementById('loaderOverlay');
  if (overlay) overlay.style.display = 'none';
}

function showError(msg) {
  console.error(msg);

  const overlay = document.getElementById('loaderOverlay');
  const icon = document.getElementById('loaderIcon');
  const msgEl = document.getElementById('loaderMsg');
  const sub = document.getElementById('loaderSub');
  const spin = document.getElementById('loaderSpin');

  if (overlay) overlay.style.display = 'flex';
  if (icon) {
    icon.textContent = '⚠';
    icon.style.color = 'var(--red)';
  }
  if (msgEl) msgEl.textContent = msg;
  if (sub) sub.textContent = 'Check the SHEET_URL and sheet format.';
  if (spin) spin.style.display = 'none';
}

async function loadSheetData() {
  if (!SHEET_URL || SHEET_URL.includes('YOUR_GOOGLE_SHEET')) {
    showError('Google Sheet URL not configured.');
    return;
  }

  showLoader('Fetching data from Google Sheets…');

  let csvText;
  try {
    const resp = await fetch(SHEET_URL, { cache: 'no-store' });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    csvText = await resp.text();
    if (!csvText || csvText.length < 10) throw new Error('Empty response');
  } catch (err) {
    showError('Could not load data: ' + err.message);
    return;
  }

  showLoader('Parsing & classifying payments…');
  await new Promise(r => setTimeout(r, 10));

  const rows = parseCSV(csvText);
  if (!rows.length) {
    showError('No Down Payment rows found. Check your sheet format.');
    return;
  }

  classify(rows);

  showLoader('Building dashboard…');
  await new Promise(r => setTimeout(r, 10));

  RAW = buildMainData(rows);
  DETAIL = buildDetailData(rows);
  ALL_AGENTS = [...new Set(rows.map(r => r.agent).filter(Boolean))].sort();
  ALL_OFFICES = [...new Set(rows.map(r => r.office).filter(Boolean))].sort();

  hideLoader();

  const lastUpdated = document.getElementById('lastUpdated');
  if (lastUpdated) {
    lastUpdated.textContent = 'Last updated: ' + new Date().toLocaleString();
  }

  init();
}

function refreshData() {
  RAW = null;
  DETAIL = null;
  ALL_AGENTS = [];
  ALL_OFFICES = [];
  agentSel = null;
  officeSel = null;
  loadSheetData();
}

function init() {
  if (!RAW || !RAW.all_months || !RAW.all_months.length) {
    showError('Dashboard data is missing after load.');
    return;
  }

  const months = getMonths();
  const mLabels = getMonthLabels();

  const fromEl = document.getElementById('dateFrom');
  const toEl = document.getElementById('dateTo');

  fromEl.innerHTML = '';
  toEl.innerHTML = '';

  months.forEach(m => {
    fromEl.appendChild(new Option(mLabels[m], m));
    toEl.appendChild(new Option(mLabels[m], m));
  });

  fromEl.value = months[0];
  toEl.value = months[months.length - 1];

  updateTrigger('agent');
  updateTrigger('office');
  buildTableHeaders();
  buildList('agent');
  buildList('office');
  render();
}

function getRange() {
  const f = document.getElementById('dateFrom').value;
  const t = document.getElementById('dateTo').value;
  return f <= t ? [f, t] : [t, f];
}

function setView(v) {
  view = v;
  document.getElementById('btnAgent').classList.toggle('active', v === 'agent');
  document.getElementById('btnOffice').classList.toggle('active', v === 'office');
  document.getElementById('agentMsWrap').style.display = v === 'agent' ? '' : 'none';
  document.getElementById('officeMsWrap').style.display = v === 'office' ? '' : 'none';
  tblSort.risk = { col: 'rewrite_pct', dir: 'desc' };
  tblSort.vol = { col: 'total', dir: 'desc' };
  render();
}

function toggleMs(type) {
  const dd = document.getElementById(type + 'Dd');
  const tr = document.getElementById(type + 'Trigger');
  const open = dd.style.display !== 'none';
  closeAllMs();

  if (!open) {
    dd.style.display = '';
    tr.classList.add('open');
    document.getElementById(type + 'Srch').value = '';
    buildList(type);
    document.getElementById(type + 'Srch').focus();
  }
}

function closeAllMs() {
  ['agent', 'office'].forEach(t => {
    document.getElementById(t + 'Dd').style.display = 'none';
    document.getElementById(t + 'Trigger').classList.remove('open');
  });
}

document.addEventListener('click', e => {
  if (!e.target.closest('.ms-wrap')) closeAllMs();
});

function buildList(type) {
  const all = type === 'agent' ? ALL_AGENTS : ALL_OFFICES;
  const sel = type === 'agent' ? agentSel : officeSel;
  const q = document.getElementById(type + 'Srch').value.toLowerCase();
  const listEl = document.getElementById(type + 'List');
  const items = all.filter(i => i.toLowerCase().includes(q));

  listEl.innerHTML = '';
  if (!items.length) {
    listEl.innerHTML = '<div class="ms-empty">No results</div>';
    return;
  }

  items.forEach(item => {
    const checked = sel === null || sel.has(item);
    const div = document.createElement('div');
    div.className = 'ms-item' + (checked ? ' checked' : '');
    const label = type === 'agent' && item.includes(':') ? item.split(':').slice(1).join(':').trim() : item;
    div.innerHTML = '<div class="ms-cb">' + (checked ? '✓' : '') + '</div><div class="ms-itext" title="' + item + '">' + label + '</div>';
    div.onclick = e => {
      e.stopPropagation();
      toggleItem(type, item);
    };
    listEl.appendChild(div);
  });
}

function toggleItem(type, item) {
  const all = type === 'agent' ? ALL_AGENTS : ALL_OFFICES;
  let sel = type === 'agent' ? agentSel : officeSel;

  if (sel === null) sel = new Set(all.filter(i => i !== item));
  else if (sel.has(item)) sel.delete(item);
  else {
    sel.add(item);
    if (sel.size === all.length) sel = null;
  }

  if (type === 'agent') agentSel = sel;
  else officeSel = sel;

  updateTrigger(type);
  buildList(type);
  render();
}

function selAll(type) {
  if (type === 'agent') agentSel = null;
  else officeSel = null;
  updateTrigger(type);
  buildList(type);
  render();
}

function clearSel(type) {
  if (type === 'agent') agentSel = new Set();
  else officeSel = new Set();
  updateTrigger(type);
  buildList(type);
  render();
}

function updateTrigger(type) {
  const sel = type === 'agent' ? agentSel : officeSel;
  const txt = document.getElementById(type + 'Ttext');
  const cnt = document.getElementById(type + 'Cnt');

  if (sel === null) {
    txt.textContent = 'All ' + type + 's';
    cnt.style.display = 'none';
  } else if (sel.size === 0) {
    txt.textContent = 'None selected';
    cnt.style.display = 'none';
  } else {
    const arr = [...sel];
    txt.textContent = arr.length === 1
      ? (type === 'agent' && arr[0].includes(':') ? arr[0].split(':').slice(1).join(':').trim() : arr[0])
      : arr.length + ' selected';
    cnt.textContent = arr.length;
    cnt.style.display = '';
  }
}

function aggregate(range) {
  const [from, to] = range;
  const isAgent = view === 'agent';
  const rows = isAgent ? RAW.agent_rows : RAW.office_rows;
  const sel = isAgent ? agentSel : officeSel;
  const key = isAgent ? 'agent' : 'office';
  const map = {};

  for (const r of rows) {
    if (r.month < from || r.month > to) continue;
    const k = r[key];
    if (sel !== null && !sel.has(k)) continue;

    if (!map[k]) map[k] = { name: k, office: isAgent ? r.office : '', first: 0, rewrite: 0, exp: 0, winback: 0, total: 0 };

    map[k].first += r.first;
    map[k].rewrite += r.rewrite;
    map[k].exp += r.exp;
    map[k].winback += r.winback;
    map[k].total += r.total;
  }

  return Object.values(map).map(e => ({
    ...e,
    rewrite_pct: e.total > 0 ? parseFloat((e.rewrite / e.total * 100).toFixed(1)) : 0
  }));
}

function monthlyTotals(range) {
  const [from, to] = range;
  const isAgent = view === 'agent';
  const rows = isAgent ? RAW.agent_rows : RAW.office_rows;
  const sel = isAgent ? agentSel : officeSel;
  const key = isAgent ? 'agent' : 'office';
  const map = {};

  for (const r of rows) {
    if (r.month < from || r.month > to) continue;
    if (sel !== null && !sel.has(r[key])) continue;

    if (!map[r.month]) map[r.month] = { first: 0, rewrite: 0, exp: 0, winback: 0, total: 0 };

    map[r.month].first += r.first;
    map[r.month].rewrite += r.rewrite;
    map[r.month].exp += r.exp;
    map[r.month].winback += r.winback;
    map[r.month].total += r.total;
  }

  return map;
}

loadSheetData();
</script>
